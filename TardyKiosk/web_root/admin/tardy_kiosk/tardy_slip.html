<html>
<head>
  <style>
    #header {
      text-align: center;
    }
    #footer {
      margin-top: 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    label {
      font-weight: bold;
      margin-right: 5px;
    }
    div {
      padding-bottom: 2px;
    }
    div#centerholder {
      display: flex;
      justify-content: center;
    }
  </style>
~[wc:commonscripts]
</head>
<body>
  <div id="header"style="text-align: center">~(gpv.header)</div>
  <br />
  <div id="centerholder"><div id="photoholder"></div></div>
  <div><label>Student #:</label> ~(gpv.student_number)</div>
  <div><label>Name:</label> ~(gpv.name)</div>
  <div><label>Date:</label> ~(gpv.date)</div>
  <!--
  <div><label>Type:</label> ~(gpv.code)</div>
  -->
  <div><label>Class:</label> ~(gpv.class)</div>
  <div><label>Teacher:</label> ~(gpv.teacher)</div>
  <div><label>Class Tardies:</label> ~(gpv.class_tardy_count)</div>
  <div><label>Total Tardies:</label> ~(gpv.total_tardy_count)</div>
  ~[if.gpv.slip_disable_comment=0]
    <div><label>Comment:</label> ~(gpv.comment)</div>
  [/if]
  <div id="footer">~(gpv.footer)</div>
  <div id="studenttitlephoto2" hidden>~[studenttitlephoto2]</div>
</body>
</html>
<script>
  $j(document).ready(function () {
  if ($j("div#studenttitlephoto2 > #student_details_avatar > a > img:first").length > 0) {
    $j("#photoholder").append($j("div#studenttitlephoto2 > #student_details_avatar > a > img:first"));
    $j("#photoholder > img").attr("height", (parseInt(Number($j("#photoholder > img").attr("height")) * 1.25)));
    $j("#photoholder > img").attr("width", (parseInt(Number($j("#photoholder > img").attr("width")) * 1.25)));
  } else {
    $j("#photoholder").append('<div id="student_details_avatar" class="initial_details_avatar"><span class="initial_avatar" style="font-size: 20px;">No Photo</span></div>');
  }
   window.print();
   window.onafterprint = function(event) { window.close(); };
  });
</script>
